<!-- Enhanced Path Modal -->
<template>
    <lightning-card hide-header="true" label="Enhanced Path Modal" variant="narrow">
        <lightning-modal-body>
            <lightning-layout multiple-rows="true">
                <!-- Spinner -->
                <template lwc:if={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
                </template>
                <!-- Dependent Fields -->
                <template lwc:if={showDependentFields}>
                    <lightning-layout-item size="12" flexibility="grow" class="slds-p-left_medium slds-p-right_medium">
                        <h2 class="slds-text-heading_small slds-p-bottom_small slds-p-top_x-small slds-text-title_bold">
                            Moving the {fieldLabel} to {selectedLabel} requires dependent fields to be filled out!
                        </h2>
                        <lightning-record-edit-form
                            object-api-name={objectApiName}
                            record-id={recordId}
                            record-type-id={recordTypeId}
                            onsubmit={handleRecordFormSubmit}
                            onload={handleFormLoaded}
                        >
                            <lightning-layout multiple-rows="true">
                                <lightning-layout-item size="12" large-device-size={editFormLargeDeviceColumnSize}>
                                    <lightning-input-field
                                        field-name={fieldApiName}
                                        value={selectedValue}
                                        required="true"
                                        disabled="true"
                                    ></lightning-input-field>
                                    <template lwc:if={hasDependentFields}>
                                        <template for:each={dependentFields} for:item="dependentField">
                                            <lightning-input-field
                                                field-name={dependentField}
                                                key={dependentField}
                                                required="true"
                                            ></lightning-input-field>
                                        </template>
                                    </template>
                                </lightning-layout-item>
                                <template lwc:if={hasOptionalFields}>
                                    <lightning-layout-item size="12" large-device-size={editFormLargeDeviceColumnSize}>
                                        <template for:each={optionalFields} for:item="optionalField">
                                            <lightning-input-field
                                                field-name={optionalField}
                                                key={optionalField}
                                            ></lightning-input-field>
                                        </template>
                                    </lightning-layout-item>
                                </template>
                            </lightning-layout>
                            <lightning-button
                                type="submit"
                                label="Save"
                                variant="brand"
                                class="slds-p-top_small slds-align_absolute-center"
                                disabled={isLoading}
                            ></lightning-button>
                        </lightning-record-edit-form>
                    </lightning-layout-item>
                </template>
                <template lwc:elseif={showFlow}>
                    <lightning-layout-item size="12" flexibility="grow" class="slds-p-left_medium slds-p-right_medium">
                        <h2 class="slds-text-heading_small slds-p-bottom_small slds-p-top_x-small slds-text-title_bold">
                            Moving the {fieldLabel} to {selectedLabel} requires additional steps!
                        </h2>
                        <lightning-flow
                            flow-api-name={flowApiName}
                            flow-input-variables={flowInputVariables}
                            flow-finish-behavior="NONE"
                            onstatuschange={handleFlowStatusChange}
                            class="slds-p-around_medium"
                        >
                        </lightning-flow>
                    </lightning-layout-item>
                </template>
                <template lwc:else>
                    <lightning-layout-item size="12" flexibility="grow" class="slds-p-left_medium slds-p-right_medium">
                        <h2 class="slds-text-heading_small slds-p-bottom_small slds-p-top_x-small slds-text-title_bold">
                            Select a more specific {groupLabel} value for {fieldLabel} to proceed!
                        </h2>
                        <lightning-record-edit-form
                            object-api-name={objectApiName}
                            record-id={recordId}
                            record-type-id={recordTypeId}
                            onsubmit={handleGroupingFormSubmit}
                            onload={handleFormLoaded}
                        >
                            <lightning-combobox
                                name="picklistValueFromGrouping"
                                label={picklistFieldLabel}
                                placeholder="Select an option"
                                options={groupedValues}
                                value={selectedGroupedValue}
                                onchange={handleGroupedValueChange}
                                required="true"
                            ></lightning-combobox>
                            <lightning-button
                                type="submit"
                                label="Confirm Selection"
                                variant="brand"
                                class="slds-p-top_small slds-align_absolute-center"
                                disabled={disableConfirmSelectionButton}
                            ></lightning-button>
                        </lightning-record-edit-form>
                    </lightning-layout-item>
                </template>
            </lightning-layout>
        </lightning-modal-body>
        <lightning-modal-footer></lightning-modal-footer>
    </lightning-card>
</template>
